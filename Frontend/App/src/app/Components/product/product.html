<div class="container mt-4">
  <h2 class="text-center mb-4">Products</h2>
  
  <!-- Cart Notification -->
  @if (stringFromCard) {
  <div class="alert alert-success text-center mb-4 shadow-sm border-0">
    Successfully added <strong>{{ stringFromCard }}</strong> to your cart!
  </div>
  }

  <div class="row g-4">
    @for (p of product; track p.id) {
    <!-- Responsive Grid: 1 col mobile, 2 tablet, 3 large tablet, 4 desktop -->
    <div class="col-12 col-sm-6 col-md-4 col-lg-3">
      <div class="card h-100 product-card border-0 shadow-sm" appCardBg="#ffffff">
        
        <!-- Image & Badges -->
        <div class="position-relative overflow-hidden product-image-container">
          <span class="badge bg-danger position-absolute top-0 start-0 m-2 z-1">30% OFF</span>
          <span class="badge bg-dark position-absolute top-0 end-0 m-2 z-1 text-capitalize">{{ p.category }}</span>
          <img [src]="p.image" class="card-img-top product-image" [alt]="p.name" loading="lazy">
        </div>

        <!-- Card Body -->
        <div class="card-body d-flex flex-column p-4">
          <h5 class="card-title fw-bold text-truncate mb-2" [title]="p.name">{{ p.name }}</h5>
          <p class="card-text text-muted small mb-3 description-clamp">{{ p.description }}</p>
          
          <!-- Pricing & Action -->
          <div class="mt-auto">
            <div class="d-flex align-items-center gap-2 mb-3">
              <span class="text-success fw-bold fs-5">{{ (p.price ? (p.price | discount) : (100 | discount)) | currency }}</span>
              <span class="text-muted text-decoration-line-through small">{{ (p.price ? p.price : 100) | currency }}</span>
            </div>
            <button class="btn btn-primary w-100 add-to-cart-btn" (click)="recieve(p.name)">
              Add to Cart
            </button>
          </div>
        </div>
      </div>
    </div>
    }
  </div>
</div>
