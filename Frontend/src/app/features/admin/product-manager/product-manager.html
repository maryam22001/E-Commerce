<div class="admin-container">
  <h2>Product Management</h2>

  <!-- Success/Error Messages -->
  <div *ngIf="success" class="alert success">{{ success }}</div>
  <div *ngIf="error" class="alert error">{{ error }}</div>

  <button (click)="openAdd()" class="btn-primary" style="margin-bottom: 1rem;">
    Add New Product
  </button>

  <div *ngIf="loading" class="loading-message">Loading products...</div>

  <!-- Products Table -->
  <table *ngIf="!loading" class="table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Category</th>
        <th>Price</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of products">
        <td>{{ p.name }}</td>
        <td>{{ p.category }}</td>
        <td>${{ p.price }}</td>
        <td>
          <button (click)="openEdit(p)" class="btn-secondary">Edit</button>
          <button (click)="softDelete(p._id)" [disabled]="deleting === p._id" class="btn-warning">Archive</button>
          <button (click)="hardDelete(p._id)" [disabled]="deleting === p._id" class="btn-danger">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

  <!-- Add/Edit Modal -->
  <div *ngIf="showModal" class="modal-overlay">
    <div class="modal-content">
      <h3>{{ editingProduct ? 'Edit Product' : 'Add New Product' }}</h3>

      <form [formGroup]="form" (ngSubmit)="save()">
        <div class="form-group">
          <label for="name">Name</label>
          <input id="name" type="text" formControlName="name" />
        </div>

        <div class="form-group">
          <label for="discription">Description</label>
          <textarea id="discription" formControlName="discription"></textarea>
        </div>

        <div class="form-group">
          <label for="image">Image URL</label>
          <input id="image" type="text" formControlName="image" />
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" formControlName="category">
            <option value="" disabled>Select a category</option>
            <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
          </select>
        </div>

        <div class="form-group">
          <label for="price">Price ($)</label>
          <input id="price" type="number" formControlName="price" />
        </div>

        <div class="modal-actions">
          <button type="button" (click)="showModal = false" class="btn-secondary">Cancel</button>
          <button type="submit" [disabled]="saving || form.invalid" class="btn-primary">
            {{ saving ? 'Saving...' : 'Save' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
