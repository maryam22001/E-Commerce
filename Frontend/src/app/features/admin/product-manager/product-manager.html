<div class="admin-container" style="padding: 2rem; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 1200px; margin: 0 auto;">
  <h2 style="color: #333; margin-bottom: 1.5rem; border-bottom: 2px solid #eaeaea; padding-bottom: 0.5rem;">
    Admin Product Management
  </h2>

  <div class="form-section" style="background: #fdfdfd; padding: 1.5rem; border-radius: 8px; margin-bottom: 2.5rem; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
    <h3 style="margin-top: 0; color: #4a5568;">
      {{ isEditMode ? '✏️ Edit Product Details' : '➕ Add New Product' }}
    </h3>

    <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
        <div>
          <label style="display: block; margin-bottom: 0.4rem; font-weight: 600; color: #4a5568;">Product Name</label>
          <input type="text" formControlName="name" style="width: 100%; padding: 0.6rem; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;" placeholder="e.g., Wireless Headphones" />
        </div>
        <div>
          <label style="display: block; margin-bottom: 0.4rem; font-weight: 600; color: #4a5568;">Price ($)</label>
          <input type="number" formControlName="price" style="width: 100%; padding: 0.6rem; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;" placeholder="0.00" />
        </div>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
        <div>
          <label style="display: block; margin-bottom: 0.4rem; font-weight: 600; color: #4a5568;">Category</label>
          <select formControlName="category" style="width: 100%; padding: 0.6rem; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; background: white;">
            <option value="" disabled>Select a category</option>
            <option value="electronics">Electronics</option>
            <option value="clothing">Clothing</option>
            <option value="books">Books</option>
            <option value="home">Home</option>
            <option value="beauty">Beauty</option>
            <option value="sports">Sports</option>
            <option value="toys">Toys</option>
          </select>
        </div>
        <div>
          <label style="display: block; margin-bottom: 0.4rem; font-weight: 600; color: #4a5568;">Image URL</label>
          <input type="text" formControlName="image" style="width: 100%; padding: 0.6rem; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;" placeholder="https://example.com/image.jpg" />
        </div>
      </div>

      <div style="margin-bottom: 1.5rem;">
        <label style="display: block; margin-bottom: 0.4rem; font-weight: 600; color: #4a5568;">Description</label>
        <textarea formControlName="discription" rows="3" style="width: 100%; padding: 0.6rem; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; resize: vertical;" placeholder="Provide an explicit product summary..."></textarea>
      </div>

      <div style="display: flex; gap: 0.75rem;">
        <button type="submit" [disabled]="productForm.invalid" style="background: #2563eb; color: white; padding: 0.6rem 2rem; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: background 0.2s;" [style.opacity]="productForm.invalid ? '0.5' : '1'">
          {{ isEditMode ? 'Update Product' : 'Save Product' }}
        </button>
        <button type="button" (click)="resetForm()" style="background: #64748b; color: white; padding: 0.6rem 1.5rem; border: none; border-radius: 6px; font-weight: 600; cursor: pointer;">
          Cancel / Clear
        </button>
      </div>
    </form>
  </div>

  <div class="list-section">
    <h3 style="color: #4a5568; margin-bottom: 1rem;">Inventory List ({{ products.length }} items)</h3>

    <table style="width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0;">
      <thead>
        <tr style="background: #f1f5f9; text-align: left;">
          <th style="padding: 1rem; color: #475569; font-weight: 600;">Image</th>
          <th style="padding: 1rem; color: #475569; font-weight: 600;">Name</th>
          <th style="padding: 1rem; color: #475569; font-weight: 600;">Category</th>
          <th style="padding: 1rem; color: #475569; font-weight: 600;">Price</th>
          <th style="padding: 1rem; text-align: center; color: #475569; font-weight: 600;">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let product of products" style="border-bottom: 1px solid #f1f5f9; transition: background 0.15s;">
          <td style="padding: 0.75rem 1rem;">
            <img [src]="product.image" alt="Thumbnail" style="width: 50px; height: 50px; object-fit: contain; border-radius: 4px; border: 1px solid #e2e8f0;" onerror="this.src='https://placehold.co/50x50/e2e8f0/475569?text=No+Img'" />
          </td>
          <td style="padding: 1rem; font-weight: 500; color: #1e293b;">{{ product.name }}</td>
          <td style="padding: 1rem; color: #64748b;">{{ product.category }}</td>
          <td style="padding: 1rem; color: #16a34a; font-weight: 700;">${{ product.price }}</td>
          <td style="padding: 1rem; text-align: center;">
            <button (click)="onEdit(product)" style="background: #eab308; color: #fff; padding: 0.4rem 1rem; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; margin-right: 0.5rem;">
              Edit
            </button>
            <button (click)="onDelete(product._id || product.id)" style="background: #ef4444; color: white; padding: 0.4rem 1rem; border: none; border-radius: 4px; font-weight: 600; cursor: pointer;">
              Delete
            </button>
          </td>
        </tr>
        <tr *ngIf="products.length === 0">
          <td colspan="5" style="text-align: center; padding: 3rem; color: #94a3b8; font-style: italic;">
            No items available in database. Add a product above.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
