<div class="min-vh-100 d-flex align-items-center bg-light">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-8 col-lg-5">
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
          <div class="bg-dark p-4 text-center">
            <div class="display-5 mb-2">📧</div>
            <h4 class="text-white fw-bold mb-0">Verify Your Email</h4>
            <p class="text-muted mb-0 small">Enter the 6-digit code sent to your email</p>
          </div>
          <div class="card-body p-4 p-md-5">
            @if (error) {
              <div class="alert alert-danger rounded-3">{{ error }}</div>
            }
            <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
              <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" class="form-control form-control-lg rounded-3"
                  formControlName="email" [class.is-invalid]="f['email'].touched && f['email'].invalid">
                @if (f['email'].touched && f['email'].invalid) {
                  <div class="invalid-feedback">Enter a valid email.</div>
                }
              </div>
              <div class="mb-4">
                <label class="form-label fw-semibold">OTP Code</label>
                <input type="text" class="form-control form-control-lg rounded-3 text-center fw-bold fs-4 letter-spacing-wide"
                  formControlName="otp" placeholder="000000" maxlength="6"
                  [class.is-invalid]="f['otp'].touched && f['otp'].invalid">
                @if (f['otp'].touched && f['otp'].invalid) {
                  <div class="invalid-feedback">Enter the 6-digit code.</div>
                }
              </div>
              <button type="submit" class="btn btn-dark btn-lg w-100 rounded-3 fw-semibold" [disabled]="loading">
                @if (loading) { <span class="spinner-border spinner-border-sm me-2"></span> }
                Verify Email
              </button>
            </form>
            <p class="text-center mt-3 mb-0 text-muted small">
              <a routerLink="/auth/signup" class="text-decoration-none">Back to Sign Up</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
